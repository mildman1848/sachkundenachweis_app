name: 📦 Build APK & Release

on:
  workflow_dispatch:

jobs:
  build:
    name: 🧪 Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Repository auschecken
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🛠️ Flutter SDK einrichten
        uses: subosito/flutter-action@v2.22.0
        with:
          flutter-version: '3.32.4'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: 🧰 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Node.js-Abhängigkeiten installieren
        run: npm install

      - name: 🏷️ Version validieren
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          version_file=$(tr -d '\n\r' < VERSION)
          pubspec_version=$(grep '^version:' pubspec.yaml | awk '{print $2}')

          if [ "$package_version" != "$version_file" ]; then
            echo "package.json ($package_version) and VERSION ($version_file) do not match" >&2
            exit 1
          fi

          if [ "$package_version" != "$pubspec_version" ]; then
            echo "package.json ($package_version) and pubspec.yaml ($pubspec_version) do not match" >&2
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: 📦 Flutter-Abhängigkeiten installieren
        run: flutter pub get

      - name: 🧪 Flutter-Tests ausführen
        run: flutter test

      - name: 🎨 Android App Icon generieren
        run: flutter pub run flutter_launcher_icons:main -f pubspec.yaml

      - name: 🏗️ Release APK bauen
        run: flutter build apk --release

      - name: 🏗️ Release AppBundle bauen
        run: flutter build appbundle --release

      - name: 🏷️ Git-Tag erstellen
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${version}"
          git push origin "v${version}"

      - name: 🗂 GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: ./CHANGELOG.md
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
