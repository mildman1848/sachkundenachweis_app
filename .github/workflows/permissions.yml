name: Permission check

on:
  pull_request:
    paths:
      - "**/*.sh"
      - "**/run"
      - "**/finish"
      - "**/check"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  permission-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate executable service scripts
        shell: bash
        run: |
          set -euo pipefail
          found=0
          failed=0
          while IFS= read -r file; do
            found=1
            if [ ! -x "$file" ]; then
              echo "::error file=$file::Expected executable permission"
              failed=1
            fi
          done < <(find . -type f \( -name '*.sh' -o -name 'run' -o -name 'finish' -o -name 'check' \))
          if [ "$found" -eq 0 ]; then
            echo "No matching executable scripts found."
          fi
          exit "$failed"
